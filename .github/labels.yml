# GitHub Labels Configuration
# Use this to ensure consistent labeling across your project
# Import with: gh label create -f .github/labels.yml

# Type labels
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"

- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"

- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"

- name: "breaking-change"
  color: "b60205"
  description: "Breaking changes that require major version bump"

# Component labels
- name: "cli"
  color: "1d76db"
  description: "Related to CLI (command-line interface)"

- name: "web"
  color: "1d76db"
  description: "Related to web application"

- name: "dependencies"
  color: "0366d6"
  description: "Pull requests that update dependencies"

- name: "config"
  color: "d4c5f9"
  description: "Configuration changes"

- name: "tests"
  color: "c5def5"
  description: "Related to testing"

- name: "ci"
  color: "bfd4f2"
  description: "Continuous Integration"

- name: "types"
  color: "c2e0c6"
  description: "TypeScript types and type definitions"

# Status labels
- name: "needs-triage"
  color: "fbca04"
  description: "Needs initial review and prioritization"

- name: "in-progress"
  color: "0e8a16"
  description: "Currently being worked on"

- name: "waiting-for-review"
  color: "fbca04"
  description: "Waiting for maintainer review"

- name: "stale"
  color: "eeeeee"
  description: "No activity for extended period"

# Priority labels
- name: "priority: high"
  color: "d93f0b"
  description: "High priority issue"

- name: "priority: medium"
  color: "fbca04"
  description: "Medium priority issue"

- name: "priority: low"
  color: "0e8a16"
  description: "Low priority issue"

# Size labels (auto-generated by labeler.yml)
- name: "size/XS"
  color: "00ff00"
  description: "Extra small PR (< 10 lines)"

- name: "size/S"
  color: "66ff66"
  description: "Small PR (10-50 lines)"

- name: "size/M"
  color: "ffff00"
  description: "Medium PR (50-200 lines)"

- name: "size/L"
  color: "ff9900"
  description: "Large PR (200-500 lines)"

- name: "size/XL"
  color: "ff0000"
  description: "Extra large PR (> 500 lines)"

# Community labels
- name: "good-first-issue"
  color: "7057ff"
  description: "Good for newcomers"

- name: "help-wanted"
  color: "008672"
  description: "Extra attention is needed"

- name: "security"
  color: "b60205"
  description: "Security related issue"

- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"

- name: "invalid"
  color: "e4e669"
  description: "This doesn't seem right"

- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"

- name: "pinned"
  color: "ff69b4"
  description: "Should not be marked as stale"
