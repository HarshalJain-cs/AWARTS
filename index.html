        <h1>AWARTS — Strava for AI Coding</h1>
        <p>AWARTS is the <strong>Strava for AI coding</strong>. Track your AI coding sessions across <strong>Claude, Codex, Gemini &amp; Antigravity</strong>. Compete on leaderboards, share sessions, maintain streaks, and join developers worldwide.</p>

        <h2>What is AWARTS?</h2>
        <p>Think of AWARTS as <strong>Strava but for coding</strong>. Just like Strava tracks your runs and workouts, AWARTS tracks your AI-assisted coding sessions. Every token, every session, every provider — all in one place.</p>

        <h2>Track AI Coding Across All Providers</h2>
        <ul>
          <li><strong>Claude Code Tracker</strong> — Auto-detect Claude usage from ~/.claude/</li>
          <li><strong>Codex Tracker</strong> — Track OpenAI Codex sessions and spending</li>
          <li><strong>Gemini Tracker</strong> — Monitor Google Gemini coding usage</li>
          <li><strong>Antigravity Tracker</strong> — Track Antigravity AI sessions</li>
        </ul>

        <h2>Features</h2>
        <ul>
          <li><strong>AI Coding Leaderboard</strong> — Compete globally or by country</li>
          <li><strong>Coding Streaks</strong> — Maintain daily coding streaks like Strava</li>
          <li><strong>Activity Feed</strong> — Share and discover AI coding sessions</li>
          <li><strong>AI Cost Tracker</strong> — Track spending across all AI providers</li>
          <li><strong>Token Analytics</strong> — Input/output token breakdowns and trends</li>
          <li><strong>Recap Cards</strong> — Beautiful shareable session summaries</li>
          <li><strong>Developer Profiles</strong> — Show your AI coding stats</li>
          <li><strong>CLI Tool</strong> — One command: npx awarts@latest</li>
        </ul>

        <h2>Get Started — Free</h2>
        <p>Install the CLI and start tracking in seconds:</p>
        <code>npx awarts@latest</code>

        <h2>Strava for Developers</h2>
        <p>AWARTS brings the <strong>Strava experience to AI-assisted development</strong>. Track Claude Code usage, Codex sessions, Gemini coding, and Antigravity AI — all with leaderboards, streaks, kudos, and social features. Whether you call it <em>Strava for coding</em>, <em>Strava for AI</em>, or <em>code tracker</em> — AWARTS is the definitive platform for tracking your AI coding productivity.</p>

        <h2>Vibe Coding Tracker</h2>
        <p>Track your <strong>vibe coding</strong> sessions. See how much you code with AI assistants, compare with peers, and maintain your coding streak. Works with <strong>Claude Code, OpenAI Codex, Google Gemini, Cursor AI</strong> (via underlying providers), and <strong>Antigravity</strong>.</p>

        <h2>Why Developers Choose AWARTS</h2>
        <ul>
          <li>100% free and open source</li>
          <li>No API keys needed — reads local files</li>
          <li>Privacy-first — never collects your code or prompts</li>
          <li>Works across Claude, Codex, Gemini, and Antigravity</li>
          <li>Leaderboards, streaks, and social features</li>
          <li>Beautiful analytics dashboard</li>
        </ul>
